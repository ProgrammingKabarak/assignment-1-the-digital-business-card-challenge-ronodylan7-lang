<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        .business-card {
            width: 350px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: #1e3a8a;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid white;
            margin-top: -50px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            object-fit: cover;
        }

        .content {
            padding: 20px;
            text-align: center;
        }

        .content p {
            color: #555;
        }

        .skills {
            text-align: left;
            margin-top: 15px;
        }

        .skills ul {
            padding-left: 20px;
        }

        .social-links a {
            display: inline-block;
            margin: 10px;
            text-decoration: none;
            color: #1e3a8a;
            font-weight: bold;
        }

        .social-links a:hover {
            color: #2563eb;
        }
    </style>
</head>
<body>

    <div class="business-card">
        <div class="header">
            <h1>DYLAN RONO</h1>
            <p>Web Developer</p>
        </div>

        
        <div class="content">
            <p>
                Passionate web developer focused on creating clean,
                responsive, and user-friendly websites.
            </p>

            <div class="skills">
                <h2>Skills</h2>
                <ul>
                    <li>HTML & CSS</li>
                    <li>JavaScript</li>
                    <li>Responsive Design</li>
                </ul>
            </div>

            <div class="social-links">
                <a href="https://github.com/dylanrono" target="_blank">GitHub</a>
                <a href="https://linkedin.com/in/dylanrono" target="_blank">LinkedIn</a>
                <a href="https://twitter.com/dylanrono" target="_blank">Twitter/X</a>
            </div>
        </div>
    </div>

</body>
</html>
